name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the form below.

  - type: input
    id: image-tag
    attributes:
      label: Image Tag
      description: "Which image tag are you using?"
      placeholder: "e.g. 1.1.0-duo6.5.2 or edge-duo6.5.2"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - linux/amd64
        - linux/arm64
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What happened? What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Minimal steps to reproduce the issue."
      placeholder: |
        1. Run `docker run ...`
        2. Observe error in logs
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: "Paste any relevant container logs (redact secrets)."
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Docker version, OS, orchestrator, etc."
      placeholder: |
        Docker: 27.x
        OS: Ubuntu 24.04
        Orchestrator: Docker Compose / Kubernetes / Swarm
